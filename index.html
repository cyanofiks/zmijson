<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HDZ Snake</title>
<style>
body{margin:0;background:#0b2c5f;display:flex;justify-content:center;align-items:center;flex-direction:column;height:100vh;font-family:Arial}
canvas{background:#4aa64f;border:4px solid #fff;border-radius:10px;max-width:95vw;max-height:90vh}
button{margin-top:10px;padding:10px 18px;font-size:18px}
</style>
</head>
<body>
<canvas id="c" width="480" height="720"></canvas>
<button onclick="location.reload()">🔄 Nova igra</button>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const g=40,w=12,h=18;
let snake=[{x:6,y:9}],dx=1,dy=0,score=0;
let food=newFood();
function newFood(){return {x:Math.floor(Math.random()*w),y:Math.floor(Math.random()*h),e:["💰","🏢","💶","🧾"][Math.floor(Math.random()*4)]};}
function draw(){
ctx.fillStyle="#4aa64f";ctx.fillRect(0,0,cv.width,cv.height);
ctx.font="30px Arial";
ctx.fillText(food.e,food.x*g+4,food.y*g+30);
snake.forEach((s,i)=>ctx.fillText(i?"💼":"👔",s.x*g+4,s.y*g+30));
ctx.fillStyle="#fff";
ctx.font="20px Arial";
ctx.fillText("Afere: "+score,10,24);
}
function end(msg){
clearInterval(loop);
ctx.fillStyle="rgba(0,0,0,.7)";
ctx.fillRect(0,0,cv.width,cv.height);
ctx.fillStyle="#fff";
ctx.font="36px Arial";
ctx.fillText(msg,40,cv.height/2);
}
function tick(){
const head={x:snake[0].x+dx,y:snake[0].y+dy};
if(head.x<0||head.y<0||head.x>=w||head.y>=h)return end("💥 Kraj igre");
if(snake.some(s=>s.x===head.x&&s.y===head.y))return end("💥 Ugrizao si se");
snake.unshift(head);
if(head.x===food.x&&head.y===food.y){score+=5;food=newFood();}
else snake.pop();
draw();
}
document.addEventListener("keydown",e=>{
if(e.key==="ArrowUp"&&dy===0){dx=0;dy=-1;}
if(e.key==="ArrowDown"&&dy===0){dx=0;dy=1;}
if(e.key==="ArrowLeft"&&dx===0){dx=-1;dy=0;}
if(e.key==="ArrowRight"&&dx===0){dx=1;dy=0;}
});
let sx=0,sy=0;
cv.addEventListener("touchstart",e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;});
cv.addEventListener("touchend",e=>{
let mx=e.changedTouches[0].clientX-sx,my=e.changedTouches[0].clientY-sy;
if(Math.abs(mx)>Math.abs(my)){if(mx>0&&dx===0){dx=1;dy=0;} if(mx<0&&dx===0){dx=-1;dy=0;}}
else{if(my>0&&dy===0){dx=0;dy=1;} if(my<0&&dy===0){dx=0;dy=-1;}}
});
draw();
const loop=setInterval(tick,180);
</script>
</body>
</html>
